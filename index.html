<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igreja Batista El Shadai | Proclamando Jesus ao Mundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #5a7a6a;
            --dark-green: #3d5246;
            --light-green: #7a9a8a;
            --cream: #f5f3f0;
            --white: #ffffff;
            --text-dark: #2c3e2d;
            --text-light: #5a6b5c;
            --accent-gold: #c9b037;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cream);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 5%;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            transition: var(--transition);
        }

        nav.scrolled {
            padding: 0.5rem 5%;
            background: rgba(255, 255, 255, 0.98);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        /* IMAGEM 1: Logo da navegação */
        .logo img {
            height: 50px;
            width: auto;
            transition: var(--transition);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text span:first-child {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            color: var(--primary-green);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo-text span:last-child {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.95rem;
            position: relative;
            transition: var(--transition);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-green);
            transition: var(--transition);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .mobile-menu {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
        }

        .mobile-menu span {
            width: 25px;
            height: 2px;
            background: var(--primary-green);
            transition: var(--transition);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--cream) 0%, #e8e6e3 100%);
            position: relative;
            overflow: hidden;
            padding: 120px 5% 80px;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(90,122,106,0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, -30px) scale(1.1); }
        }

        .hero-content {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-text h1 {
            font-size: 4rem;
            line-height: 1.1;
            color: var(--dark-green);
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
        }

        .hero-text .subtitle {
            font-size: 1.5rem;
            color: var(--primary-green);
            margin-bottom: 1rem;
            font-style: italic;
            opacity: 0;
            animation: fadeInUp 1s ease 0.2s forwards;
        }

        .hero-text p {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 2rem;
            max-width: 500px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.4s forwards;
        }

        .hero-verse {
            background: rgba(90, 122, 106, 0.1);
            padding: 1.5rem;
            border-left: 4px solid var(--primary-green);
            margin: 2rem 0;
            font-style: italic;
            color: var(--text-dark);
            opacity: 0;
            animation: fadeInUp 1s ease 0.6s forwards;
        }

        .hero-verse cite {
            display: block;
            margin-top: 0.5rem;
            font-weight: 600;
            color: var(--primary-green);
            font-style: normal;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeInUp 1s ease 0.8s forwards;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary-green);
            color: white;
            box-shadow: 0 4px 15px rgba(90, 122, 106, 0.3);
        }

        .btn-primary:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(90, 122, 106, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
        }

        .btn-secondary:hover {
            background: var(--primary-green);
            color: white;
        }

        .hero-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-logo-large {
            width: 400px;
            height: 400px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            position: relative;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* IMAGEM 2: Logo grande no hero */
        .hero-logo-large img {
            width: 70%;
            height: auto;
        }

        .floating-badge {
            position: absolute;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            color: var(--primary-green);
            animation: floatBadge 3s infinite ease-in-out;
        }

        .badge-1 {
            top: 10%;
            right: 0;
            animation-delay: 0s;
        }

        .badge-2 {
            bottom: 20%;
            left: -20px;
            animation-delay: 1s;
        }

        @keyframes floatBadge {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(30px);
            }
        }

        /* Info Bar */
        .info-bar {
            background: var(--dark-green);
            color: white;
            padding: 1rem 5%;
            position: relative;
            z-index: 10;
        }

        .info-bar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .info-item i {
            color: var(--accent-gold);
        }

        .social-links {
            display: flex;
            gap: 1rem;
        }

        .social-links a {
            color: white;
            font-size: 1.2rem;
            transition: var(--transition);
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }

        .social-links a:hover {
            background: var(--primary-green);
            transform: translateY(-3px);
        }

        /* Sections General */
        section {
            padding: 100px 5%;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            font-size: 3rem;
            color: var(--dark-green);
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .section-header h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--primary-green);
        }

        .section-header p {
            color: var(--text-light);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 1.5rem auto 0;
        }

        /* About Section */
        .about {
            background: white;
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-image {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* IMAGEM 3: Foto da igreja */
        .about-image img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .about-content h3 {
            font-size: 2rem;
            color: var(--dark-green);
            margin-bottom: 1.5rem;
        }

        .about-content p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .vision-mission {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 3rem;
        }

        .vm-card {
            background: var(--cream);
            padding: 2rem;
            border-radius: 15px;
            border-left: 4px solid var(--primary-green);
            transition: var(--transition);
        }

        .vm-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .vm-card h4 {
            color: var(--primary-green);
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Schedule Section */
        .schedule {
            background: linear-gradient(to bottom, var(--cream), white);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .schedule-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .schedule-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--primary-green);
            transform: scaleX(0);
            transform-origin: left;
            transition: var(--transition);
        }

        .schedule-card:hover::before {
            transform: scaleX(1);
        }

        .schedule-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .schedule-icon {
            width: 60px;
            height: 60px;
            background: rgba(90, 122, 106, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary-green);
            margin-bottom: 1.5rem;
        }

        .schedule-card h3 {
            font-size: 1.5rem;
            color: var(--dark-green);
            margin-bottom: 0.5rem;
        }

        .schedule-time {
            color: var(--primary-green);
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .schedule-card p {
            color: var(--text-light);
            line-height: 1.6;
        }

        .special-notice {
            background: var(--dark-green);
            color: white;
            padding: 2rem;
            border-radius: 15px;
            margin-top: 3rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .special-notice i {
            font-size: 2rem;
            color: var(--accent-gold);
        }

        /* Ministries Section */
        .ministries {
            background: white;
        }

        .ministries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .ministry-card {
            background: var(--cream);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            border: 2px solid transparent;
            text-align: center;
        }

        .ministry-card:hover {
            border-color: var(--primary-green);
            transform: translateY(-5px);
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .ministry-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .ministry-content {
            padding: 1.5rem;
        }

        .ministry-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -30px auto 1rem;
            font-size: 1.5rem;
            color: var(--primary-green);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: var(--transition);
            position: relative;
            z-index: 2;
        }

        .ministry-card:hover .ministry-icon {
            background: var(--primary-green);
            color: white;
            transform: rotateY(360deg);
        }

        .ministry-card h3 {
            color: var(--dark-green);
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }

        .ministry-card p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* Connection Section (Forms) */
        .connection {
            background: linear-gradient(135deg, var(--dark-green) 0%, var(--primary-green) 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .connection::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }

        .connection .section-header h2,
        .connection .section-header p {
            color: white;
        }

        .connection .section-header h2::after {
            background: var(--accent-gold);
        }

        .forms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            position: relative;
            z-index: 1;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            transition: var(--transition);
        }

        .form-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .form-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-card p {
            margin-bottom: 1.5rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        .form-features {
            list-style: none;
            margin-bottom: 2rem;
        }

        .form-features li {
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .form-features i {
            color: var(--accent-gold);
        }

        .btn-white {
            background: white;
            color: var(--dark-green);
            width: 100%;
            justify-content: center;
        }

        .btn-white:hover {
            background: var(--accent-gold);
            color: white;
            transform: translateY(-2px);
        }

        /* Giving Section */
        .giving {
            background: var(--cream);
        }

        .giving-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .giving-info h3 {
            font-size: 2rem;
            color: var(--dark-green);
            margin-bottom: 1.5rem;
        }

        .giving-info p {
            color: var(--text-light);
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .giving-methods {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .giving-method {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: var(--transition);
        }

        .giving-method:hover {
            transform: translateX(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .giving-icon {
            width: 50px;
            height: 50px;
            background: rgba(90, 122, 106, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-green);
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .giving-details h4 {
            color: var(--dark-green);
            margin-bottom: 0.3rem;
            font-size: 1.1rem;
        }

        .giving-details p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin: 0;
            font-family: 'Courier New', monospace;
        }

        .giving-qr {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
        }

        .qr-placeholder {
            background: var(--cream);
            border: 3px dashed var(--primary-green);
            border-radius: 15px;
            padding: 3rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* IMAGEM 4: QR Code PIX */
        .qr-placeholder img {
            width: 100%;
            max-width: 250px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .qr-instructions {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .qr-instructions strong {
            color: var(--dark-green);
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        /* History Section */
        .history {
            background: white;
            position: relative;
        }

        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary-green), var(--dark-green));
        }

        .timeline-item {
            margin-bottom: 3rem;
            position: relative;
            width: 50%;
            padding: 0 3rem;
        }

        .timeline-item:nth-child(odd) {
            left: 0;
            text-align: right;
        }

        .timeline-item:nth-child(even) {
            left: 50%;
            text-align: left;
        }

        .timeline-content {
            background: var(--cream);
            padding: 2rem;
            border-radius: 15px;
            position: relative;
            transition: var(--transition);
        }

        .timeline-content:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .timeline-content::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--primary-green);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            border: 4px solid white;
            box-shadow: 0 0 0 3px var(--primary-green);
        }

        .timeline-item:nth-child(odd) .timeline-content::before {
            right: -42px;
        }

        .timeline-item:nth-child(even) .timeline-content::before {
            left: -42px;
        }

        .timeline-date {
            color: var(--primary-green);
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timeline-content h3 {
            color: var(--dark-green);
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }

        .timeline-content p {
            color: var(--text-light);
            font-size: 0.95rem;
